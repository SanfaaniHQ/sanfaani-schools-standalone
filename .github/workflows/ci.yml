name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    name: Tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, exif, gd, intl, mbstring, pdo_mysql, pdo_sqlite, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Write CI environment
        run: |
          cat > .env <<'EOF'
          APP_NAME="Sanfaani Schools"
          APP_ENV=testing
          APP_KEY=base64:6B51G2yW9oVncbGTPK/T5yJ4U4K7KBlpS7Mxfq/0slE=
          APP_DEBUG=true
          APP_URL=http://localhost
          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          LOG_CHANNEL=stack
          LOG_LEVEL=debug
          DB_CONNECTION=sqlite
          DB_DATABASE=database/database.sqlite
          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BCRYPT_ROUNDS=4
          EOF
          touch database/database.sqlite

      - name: Clear Laravel caches
        run: php artisan optimize:clear

      - name: Compile Blade views
        run: php artisan view:cache

      - name: Build frontend assets
        run: npm run build

      - name: Run unit tests
        run: php artisan test --testsuite=Unit

      - name: Run feature tests
        run: php artisan test --testsuite=Feature

      - name: Audit Composer dependencies
        run: composer audit --locked --no-interaction --abandoned=report
